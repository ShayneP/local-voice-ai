services:
  app:
    build:
      context: .
      args:
        # CPU is the default. For GPU, prefer the overlay (it sets these for you):
        #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
        # Equivalent explicit build args:
        #   docker compose build --build-arg LLAMA_IMAGE=ghcr.io/ggml-org/llama.cpp:server-cuda \
        #                       --build-arg PYTHON_BASE=nvidia/cuda:12.8.1-runtime-ubuntu24.04 \
        #                       --build-arg TORCH_INDEX_URL=https://download.pytorch.org/whl/cu128
        LLAMA_IMAGE: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
        LIVEKIT_IMAGE: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
        PYTHON_BASE: ${PYTHON_BASE:-python:3.11-slim}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://127.0.0.1:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      STT_PROVIDER: ${STT_PROVIDER:-nemotron}
      LLAMA_HF_REPO: ${LLAMA_HF_REPO:-unsloth/Qwen3-4B-Instruct-2507-GGUF}
      LLAMA_MODEL: ${LLAMA_MODEL:-qwen3-4b}
      LLAMA_MODEL_ALIAS: ${LLAMA_MODEL_ALIAS:-qwen3-4b}
      LLAMA_CTX_SIZE: ${LLAMA_CTX_SIZE:-16384}
      LLAMA_N_GPU_LAYERS: ${LLAMA_N_GPU_LAYERS:-0}
      DEVICE: ${DEVICE:-cpu}
      # --- Audio-in half-cascade (optional) -------------------------------
      # Set LLM_AUDIO_INPUT=1 to feed mic audio straight into an audio-capable
      # LLM (Gemma-4-12B by default) and drop the dedicated STT service; the LLM
      # transcribes+reasons and Kokoro TTS speaks the reply. In this mode the
      # generic LLAMA_MODEL/ALIAS above are ignored — the model is served from
      # AUDIO_LLM_HF_REPO and addressed by AUDIO_LLM_ALIAS. Needs a llama.cpp
      # image >= b9518 (the default :server tag tracks latest, so it qualifies).
      LLM_AUDIO_INPUT: ${LLM_AUDIO_INPUT:-0}
      AUDIO_LLM_HF_REPO: ${AUDIO_LLM_HF_REPO:-unsloth/gemma-4-12b-it-GGUF}
      AUDIO_LLM_QUANT: ${AUDIO_LLM_QUANT:-Q4_K_M}
      AUDIO_LLM_ALIAS: ${AUDIO_LLM_ALIAS:-gemma-4-audio}
    ports:
      - "${WEB_PORT:-8080}:8080"
      - "${LIVEKIT_BIND_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_PORT:-7881}:7881"
      # WebRTC media over UDP. The host port must equal the container port
      # because LiveKit advertises this exact port in its ICE candidates.
      - "${LIVEKIT_UDP_PORT:-7882}:7882/udp"
    volumes:
      - models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  models:
